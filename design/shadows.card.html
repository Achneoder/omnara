<!-- @dsCard group="Components" viewport="700x180" name="Navigation — tabs" subtitle="Underline and pill tab switchers" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 24px; }
  .stack { display: flex; flex-direction: column; gap: 22px; }
</style>
</head>
<body>
<div id="root" class="stack"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs } = window.OmnaraDesignSystem_c73439;
  const Ico = (n) => <i data-lucide={n}></i>;
  function Demo() {
    const [a, setA] = React.useState("review");
    const [b, setB] = React.useState("all");
    return (
      <>
        <Tabs value={a} onChange={setA} items={[
          { value: "all", label: "All content", icon: Ico("layout-grid") },
          { value: "review", label: "Needs review", count: 4, icon: Ico("eye") },
          { value: "live", label: "Live", icon: Ico("globe") },
        ]} />
        <Tabs variant="pill" value={b} onChange={setB} items={[
          { value: "all", label: "All" },
          { value: "ai", label: "AI-drafted" },
          { value: "human", label: "Human" },
        ]} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>

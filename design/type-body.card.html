<!-- @dsCard group="Brand" viewport="700x170" name="AI disclosure pattern" subtitle="Amber spark always discloses AI authorship — never hidden" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:22px;font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;
    padding:4px 10px;border-radius:var(--radius-full);background:var(--ai-soft);color:var(--ai-text)}
  .badge svg{width:13px;height:13px}
  .live{background:var(--success-soft);color:var(--success)}
  .live .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .row{display:flex;gap:10px;align-items:center}
  .note{font:var(--type-body-sm);color:var(--text-muted);max-width:560px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
</style></head>
<body>
  <div class="row">
    <span class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9l-4.8 1.9L12 15.7 10.1 11 5.3 9l4.8-1.2z"/></svg>Drafted by omnara</span>
    <span class="badge live"><span class="dot"></span>Live</span>
    <span class="meta">· review before publishing</span>
  </div>
  <p class="note">Anything an agent creates is marked with the amber spark until a human reviews it. The signal-green "Live" badge is reserved for published content. omnara never hides its own authorship.</p>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Soft but precise — pills for status, square for code" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:22px;font-family:var(--font-mono);display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{width:70px;height:56px;background:var(--surface);border:1px solid var(--border-default);
    box-shadow:var(--shadow-sm)}
  .n{font-size:10px;color:var(--text-muted);margin-top:8px}
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 6</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md · 8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 16</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="n">2xl · 22</div></div>
  <div class="item"><div class="box" style="width:56px;border-radius:var(--radius-full)"></div><div class="n">full</div></div>
</body></html>

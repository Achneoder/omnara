<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:22px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .item{border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:12px 14px;background:var(--surface)}
  .yes{font:var(--type-body-sm);color:var(--text-strong)}
  .no{font:var(--type-body-sm);color:var(--text-faint);text-decoration:line-through;margin-top:4px}
  .tag{font:var(--type-eyebrow);letter-spacing:var(--tracking-caps);text-transform:uppercase;margin-bottom:6px}
  .tag.g{color:var(--success)} .tag.r{color:var(--danger)}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="tag g">Write</div><div class="yes">omnara published 3 pages.</div><div class="no">I published your pages! 🎉</div></div>
    <div class="item"><div class="tag g">Write</div><div class="yes">Couldn't reach the MCP server. Retrying in 5s.</div><div class="no">Oops! Something went wrong.</div></div>
    <div class="item"><div class="tag g">Write</div><div class="yes">No content yet. Ask omnara to draft your first page.</div><div class="no">Get Started Now!</div></div>
    <div class="item"><div class="tag g">Write</div><div class="yes">Publish changes · Review draft · Connect a site</div><div class="no">Publish Changes</div></div>
  </div>
</body></html>

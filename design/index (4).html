<!-- @dsCard group="Colors" viewport="700x150" name="Stone — warm neutrals" subtitle="Paper → ink. Carries every surface and text role" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:20px;font-family:var(--font-sans)}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;
    font-family:var(--font-mono);font-size:10px}
  .meta{display:flex;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--text-muted)}
  .meta code{font-family:var(--font-mono);color:var(--text-body)}
</style></head>
<body>
  <div class="scale">
    <div class="sw" style="background:var(--stone-50);color:#5B554B">50</div>
    <div class="sw" style="background:var(--stone-100);color:#5B554B">100</div>
    <div class="sw" style="background:var(--stone-200);color:#5B554B">200</div>
    <div class="sw" style="background:var(--stone-300);color:#42">300</div>
    <div class="sw" style="background:var(--stone-400);color:#fff">400</div>
    <div class="sw" style="background:var(--stone-500);color:#fff">500</div>
    <div class="sw" style="background:var(--stone-600);color:#fff">600</div>
    <div class="sw" style="background:var(--stone-700);color:#fff">700</div>
    <div class="sw" style="background:var(--stone-800);color:#E6E2D8">800</div>
    <div class="sw" style="background:var(--stone-900);color:#E6E2D8">900</div>
    <div class="sw" style="background:var(--stone-950);color:#E6E2D8">950</div>
  </div>
  <div class="meta"><span><code>#FAF8F3</code> paper → <code>#0F0E0B</code> ink</span><span>warm-tinted, never pure grey</span></div>
</body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Textarea, Select, Switch, Checkbox } = window.OmnaraDesignSystem_c73439;
  const Ico = (n) => <i data-lucide={n}></i>;
  function Demo() {
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Site URL" prefix="https://" placeholder="shop.example.com" iconRight={Ico("globe")} />
          <Input label="API key" defaultValue="sk_live_••••" error="Couldn't validate this key" />
          <Select label="Target platform" options={["WordPress", "Shopify", "Wix", "Custom API"]} />
        </div>
        <div className="stack">
          <Textarea label="Prompt" placeholder="Tell omnara what to change…" rows={3} />
          <Switch label="Auto-publish AI drafts" description="omnara publishes without review" defaultChecked />
          <Checkbox label="Sync media" description="Mirror images to the CDN on publish" defaultChecked />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>

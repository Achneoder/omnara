## Index / manifest

**Root**
- `styles.css` — global entry point (consumers link this). `@import` manifest only.
- `tokens/` — `colors · typography · spacing · radii · shadows · motion · fonts · base`
- `assets/` — `omnara-mark.svg`, `omnara-mark-mono.svg`, `omnara-mark-inverse.svg`
- `readme.md` (this file) · `SKILL.md`

**Foundation cards** — `guidelines/` (Type, Colors, Spacing, Brand specimen cards)

**Components** — `components/` (see the Design System tab → Components)
- `core/` — Button, IconButton, Badge, Tag, Card, Avatar
- `forms/` — Input, Textarea, Select, Switch, Checkbox
- `feedback/` — Dialog, Toast, Tooltip
- `navigation/` — Tabs

**UI kits** — `ui_kits/`
- `mcp-client/` — the developer-facing content command interface (dark theme)
- `dashboard/` — the human-facing management dashboard (light theme)

**Templates** (starting points consuming projects can copy) — `templates/`
- `admin-screen/` — light management-console scaffold (sidebar + topbar + empty content slot)
- `agent-session/` — dark MCP-client scaffold (session sidebar + agent thread + composer)

**Cover** — `cover.html` — branded overview / landing for this system.

> Namespace for `window.<Namespace>.<Component>` in card HTML is reported by `check_design_system`.

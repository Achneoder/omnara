<!-- @dsCard group="Colors" viewport="700x150" name="Spark amber & semantics" subtitle="Amber = AI authorship · flat success / warning / danger / info" -->
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);padding:20px;font-family:var(--font-sans)}
  .row{display:flex;gap:14px}
  .chip{flex:1;border-radius:var(--radius-md);border:1px solid var(--border-subtle);overflow:hidden}
  .chip .bar{height:48px}
  .chip .cap{padding:7px 9px;font-size:11px;color:var(--text-body)}
  .chip .cap code{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:block;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="chip"><div class="bar" style="background:var(--spark-400)"></div><div class="cap">Spark / AI<code>--ai · --spark-400</code></div></div>
    <div class="chip"><div class="bar" style="background:var(--success)"></div><div class="cap">Success<code>--success</code></div></div>
    <div class="chip"><div class="bar" style="background:var(--warning)"></div><div class="cap">Warning<code>--warning</code></div></div>
    <div class="chip"><div class="bar" style="background:var(--danger)"></div><div class="cap">Danger<code>--danger</code></div></div>
    <div class="chip"><div class="bar" style="background:var(--info)"></div><div class="cap">Info<code>--info</code></div></div>
  </div>
</body></html>

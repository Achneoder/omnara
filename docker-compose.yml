services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-omnara}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-omnara}
      POSTGRES_DB: ${DB_NAME:-omnara}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-omnara} -d ${DB_NAME:-omnara}"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
    driver: local
